version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      OLLAMA_HOST: http://ollama:11434
      CHROMA_PATH: /app/vectorstore
    volumes:
      - ./:/app
    ports:
      - "8001:8001"
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8001/api
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  ollama_data:
